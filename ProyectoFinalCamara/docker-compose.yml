version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: proyectocamara_postgres
    restart: always
    environment:
      POSTGRES_DB: ProyectoCamara
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
     - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
