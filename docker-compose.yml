services:
  postgres:
    image: postgres:16
    container_name: proyectocamara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ProyectoCamara
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d ProyectoCamara"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:4.4
    container_name: proyectocamara_mongo
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db

  ms-auth:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: ms-auth
    container_name: proyectocamara_ms-auth
    restart: unless-stopped
    env_file: .env.docker
    environment:
      PORT: 3005
      MS_CORE_URL: http://ms-core:3006
      FRONTEND_URL: http://localhost:8081
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      ADMIN_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started

  ms-core:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: ms-core
    container_name: proyectocamara_ms-core
    restart: unless-stopped
    env_file: .env.docker
    environment:
      PORT: 3006
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      ADMIN_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "3006:3006"
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:3005/api/v1
        VITE_TRAFICO_URL: http://localhost:3006/api/v1
        VITE_STREAM_URL: http://localhost:5001
    container_name: proyectocamara_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - ms-auth
      - ms-core

volumes:
  postgres_data:
  mongo_data:
